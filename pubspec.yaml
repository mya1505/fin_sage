name: fin_sage
description: Premium personal finance app with smart insights and secure cloud backup.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  intl: ^0.19.0
  flutter_bloc: ^8.1.6
  equatable: ^2.0.7
  get_it: ^8.0.3

  drift: ^2.21.0
  drift_sqflite: ^2.0.1
  sqflite: ^2.4.1
  sqflite_sqlcipher: ^3.1.0
  path: ^1.9.0
  path_provider: ^2.1.5
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.3
  encrypt: ^5.0.3

  google_sign_in: ^6.2.2
  googleapis: ^13.2.0
  googleapis_auth: ^1.6.0
  http: ^1.2.2
  workmanager: ^0.5.2
  flutter_local_notifications: ^18.0.1

  fl_chart: ^0.69.2
  flutter_svg: ^2.0.10+1
  lottie: ^3.2.0
  shimmer: ^3.0.0

  csv: ^6.0.0
  pdf: ^3.11.1
  printing: ^5.13.4

  sentry_flutter: ^8.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  mocktail: ^1.0.4
  bloc_test: ^9.1.7
  drift_dev: ^2.21.2
  build_runner: ^2.4.13

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/icons/
    - assets/lottie/
    - assets/images/
