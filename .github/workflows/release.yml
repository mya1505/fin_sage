name: FinSage Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2.23.0
        with:
          flutter-version: '3.24.5'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run tests before release
        run: flutter test

  android_build:
    runs-on: ubuntu-latest
    needs: tests
    env:
      KEYSTORE_B64: ${{ secrets.KEYSTORE_B64 }}
      KEYSTORE_PASS: ${{ secrets.KEYSTORE_PASS }}
      KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      KEY_PASS: ${{ secrets.KEY_PASS }}
      GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
      GOOGLE_SERVER_CLIENT_ID: ${{ secrets.GOOGLE_SERVER_CLIENT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2.23.0
        with:
          flutter-version: '3.24.5'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Prepare Android platform
        run: flutter create . --platforms=android --project-name fin_sage

      - name: Validate keystore secrets
        run: |
          if [ -z "$KEYSTORE_B64" ] || [ -z "$KEYSTORE_PASS" ] || [ -z "$KEY_ALIAS" ] || [ -z "$KEY_PASS" ]; then
            echo "Missing release signing secrets. Set KEYSTORE_B64, KEYSTORE_PASS, KEY_ALIAS, KEY_PASS."
            exit 1
          fi
          if [ -z "$GOOGLE_CLIENT_ID" ] || [ -z "$GOOGLE_SERVER_CLIENT_ID" ]; then
            echo "Missing Google auth secrets. Set GOOGLE_CLIENT_ID and GOOGLE_SERVER_CLIENT_ID."
            exit 1
          fi

      - name: Prepare keystore
        run: |
          echo "$KEYSTORE_B64" | base64 --decode > android/app/fin_sage.keystore
          cat <<EOT > android/key.properties
          storePassword=$KEYSTORE_PASS
          keyPassword=$KEY_PASS
          keyAlias=$KEY_ALIAS
          storeFile=fin_sage.keystore
          EOT
          cat <<EOT > android/app/key.properties
          storePassword=$KEYSTORE_PASS
          keyPassword=$KEY_PASS
          keyAlias=$KEY_ALIAS
          storeFile=fin_sage.keystore
          EOT

      - name: Build release APK
        run: |
          flutter build apk --release \
            --dart-define=GOOGLE_CLIENT_ID="$GOOGLE_CLIENT_ID" \
            --dart-define=GOOGLE_SERVER_CLIENT_ID="$GOOGLE_SERVER_CLIENT_ID"

      - name: Verify signed APK
        run: |
          test -s build/app/outputs/flutter-apk/app-release.apk
          jarsigner -verify -verbose -certs build/app/outputs/flutter-apk/app-release.apk

      - name: Generate APK checksum
        run: sha256sum build/app/outputs/flutter-apk/app-release.apk > build/app/outputs/flutter-apk/app-release.apk.sha256

      - name: Upload APK artifact
        uses: actions/upload-artifact@v7
        with:
          name: finsage-release-apk
          path: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/flutter-apk/app-release.apk.sha256

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: [android_build]

    steps:
      - name: Download APK artifact
        uses: actions/download-artifact@v5
        with:
          name: finsage-release-apk
          path: artifacts/finsage-release-apk

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/finsage-release-apk/app-release.apk
            artifacts/finsage-release-apk/app-release.apk.sha256
          generate_release_notes: true
