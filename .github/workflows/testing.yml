name: FinSage Testing

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2.23.0
        with:
          flutter-version: '3.24.5'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Verify Dart formatting (non-blocking)
        id: format
        run: |
          set +e
          dart format --output=none --set-exit-if-changed . > /tmp/dart_format.log 2>&1
          format_exit_code=$?
          set -e
          if [ $format_exit_code -ne 0 ]; then
            echo "Dart format check failed."
            echo "format_status=failed" >> "$GITHUB_OUTPUT"
          else
            echo "format_status=passed" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload format check log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: dart-format-log
          path: /tmp/dart_format.log

      - name: Static analysis
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Run unit/widget tests
        run: flutter test

      - name: Prepare linux platform for integration tests
        run: |
          flutter config --enable-linux-desktop
          flutter create . --platforms=linux

      - name: Run integration tests (best effort)
        id: integration
        timeout-minutes: 3
        run: |
          set +e
          timeout 2m flutter test integration_test -d linux > /tmp/integration_test.log 2>&1
          test_exit_code=$?
          set -e

          if [ $test_exit_code -ne 0 ]; then
            echo "Integration tests failed or timed out; stage remains non-blocking."
            echo "integration_status=failed" >> "$GITHUB_OUTPUT"
          else
            echo "integration_status=passed" >> "$GITHUB_OUTPUT"
          fi
      - name: Upload integration test log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: integration-test-log
          path: /tmp/integration_test.log

      - name: Integration test summary
        if: always()
        run: |
          if [ "${{ steps.format.outputs.format_status }}" = "passed" ]; then
            echo "Dart format check passed." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Dart format check failed (non-blocking)." >> "$GITHUB_STEP_SUMMARY"
          fi

          if [ "${{ steps.integration.outputs.integration_status }}" = "passed" ]; then
            echo "Integration tests passed." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Integration tests failed or timed out (non-blocking)." >> "$GITHUB_STEP_SUMMARY"
          fi
