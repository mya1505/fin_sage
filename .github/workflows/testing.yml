name: FinSage Testing

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2.23.0
        with:
          flutter-version: '3.24.5'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run unit/widget tests
        run: flutter test

      - name: Prepare linux platform for integration tests
        run: |
          flutter config --enable-linux-desktop
          flutter create . --platforms=linux

      - name: Run integration tests (best effort)
        timeout-minutes: 3
        run: |
          if ! timeout 2m flutter test integration_test -d linux > /tmp/integration_test.log 2>&1; then
            echo "Integration tests failed or timed out; continuing because this stage is non-blocking."
          fi
